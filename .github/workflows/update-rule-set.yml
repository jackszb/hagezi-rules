name: Update sing-box rule-set

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: read

jobs:
  update-rule-set:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Python dependencies
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        pip install requests==2.31.0
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Setup sing-box
      run: |
        set -euo pipefail
        curl -fsSL https://sing-box.app/install.sh | sh

    - name: Run generate_rule_set.py
      run: |
        set -euo pipefail
        python3 generate_rule_set.py  # 运行根目录下的 generate_rule_set.py 脚本

    - name: Commit & Push JSON and SRS files
      run: |
        git config --global user.email "github-actions@github.com"
        git config --global user.name "GitHub Actions"
        git add *.json *.srs
        git commit -m "Auto update SRS and JSON files (from rules/)" || echo "No changes"
        git push
